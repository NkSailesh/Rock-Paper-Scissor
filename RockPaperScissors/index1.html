<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
     <button onclick="
       PlayTheGame('rock');
        ">Rock</button>

     <button onclick="
       PlayTheGame('paper');
        ">Paper</button>

      
     <button onclick="
       PlayTheGame('scissor');
        ">Scissor</button>

         <p class="js-times"></p>
        <p class="js-chois"> </p>
        <p class="js-move"></p>
        <button onclick="
        Times.lose=0;
        Times.win=0;
        Times.tai=0;
          updateResult();
       
        ">Reset</button>
       
        
     <script>
        let Times= JSON.parse( localStorage.getItem('score'));
        if (Times === null ){
           Times={ 
            win:0,
            lose:0,
            tai:0};
        }

        updateResult();
          

        function PlayTheGame(playerMove){
        const CompMove = ComputerMoveReturn();
        let Result='';

            if(playerMove ==='rock'){
                    if(CompMove ==='rock'){
                Result=' Tai.';
            }
                    else if(CompMove==='paper'){
                Result='You Lose.';
            }
                    else if(CompMove==='scissor'){
                Result='You Win.';
            }
           
        }
             else if(playerMove==='paper'){
                 if(CompMove==='rock'){
                Result='You Win.';
            }
                    else if(CompMove==='paper'){
                Result='Tai.';
            }
                    else if(CompMove==='scissor'){
                Result ='You Lose.';
            }
        }
            else if(playerMove==='scissor'){
                 if(CompMove==='rock'){
                Result='You Lose.';
            }
                    else if(CompMove==='paper'){
                Result='You Win.';
            }
                    else if(CompMove==='scissor'){
                Result='Tai.';
            }
        }
        if(Result==='Tai.'){
            Times.tai +=1;
        }
        else if(Result==='You Win.'){
            Times.win +=1;
        }
        else if(Result==='You Lose.'){
            Times.lose +=1;
        }
             localStorage.setItem('score',JSON.stringify(Times))
             updateResult();
             document.querySelector('.js-move').innerHTML=` Your move is ${playerMove}
            ,Comuter Move is ${CompMove}`;
             document.querySelector('.js-chois').innerHTML=Result;
   
        }
        function updateResult(){
            document.querySelector('.js-times').innerHTML= 
        `Win: ${Times.win}, Loss; ${Times.lose}, Tai: ${Times.tai}`;
        }
        function ComputerMoveReturn(){
        const Randomvalu= Math.random();
        let CompMove='';
        if(Randomvalu>0 && Randomvalu<1/3){
            CompMove= 'rock';
        }
        else if(Randomvalu>1/3 && Randomvalu<2/3){
            CompMove='paper';
        }
        else if(Randomvalu>2/3 && Randomvalu<1){
            CompMove='scissor';
        }
        
        return CompMove;
        }

        
        
     </script>
</body>
</html>
